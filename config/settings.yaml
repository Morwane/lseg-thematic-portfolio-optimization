# Covariance estimation method for variance-based optimizers (min_variance, max_sharpe, erc).
# "sample"      : standard sample covariance (default, original behavior)
# "factor"      : factor-model covariance via OLS — Sigma = B F B' + D
#                 Uses 3 observable sector factors: Semiconductors, Cloud, Software
#                 Better-conditioned matrix, factor-based interpretation.
# "ledoit_wolf" : Ledoit-Wolf analytical shrinkage toward scaled identity
#                 Always well-conditioned; best when T/n is moderate (10-15).
covariance_method: "sample"
